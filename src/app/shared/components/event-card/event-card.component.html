<article class="event-card" [routerLink]="['/events', event().slug]">

  <div class="event-card-img">
    @if (event().hero_image_path) {
      <img [src]="event().hero_image_path" [alt]="event().title" />
    } @else {
      <div class="event-card-placeholder">
        <span>{{ event().title }}</span>
      </div>
    }
  </div>

  <div class="event-card-body">
    <div class="event-card-meta">
      <span class="meta-date">{{ event().event_date | date:'EE, d. MMM yyyy':'':'de' }}</span>
      <span class="meta-sep">·</span>
      <span class="meta-place">{{ event().location }}</span>
    </div>
    <h3 class="event-card-title">{{ event().title }}</h3>
    <p class="event-card-text">{{ event().short_description }}</p>
    <span class="btn-detail">Details →</span>
  </div>

</article>
