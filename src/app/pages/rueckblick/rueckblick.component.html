<app-page-hero
  tag="Erinnerungen"
  title="Rückblick"
  intro="Momente, die bleiben. Ein Blick zurück auf die Abende, die uns gemacht haben."
/>
<section class="rueck-sect">
  <div class="container">
    @if (loading()) {
      <div class="state-msg">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    }
    @if (error()) {
      <p class="state-msg state-msg--error">{{ error() }}</p>
    }
    @if (!loading() && !error()) {
      <div class="masonry-grid">
        @for (img of allImages(); track img.image_path; let i = $index) {
          <div class="masonry-item" (click)="openLightbox(i)">
            <img [src]="img.image_path" [alt]="img.alt_text" loading="lazy" />
            
          </div>
        }
      </div>
    }
  </div>
</section>
@if (lightboxIndex() !== null && allImages().length > 0) {
  <div class="lightbox-overlay" (click)="closeLightbox()">
    <button class="lightbox-close" (click)="closeLightbox()">✕</button>
    <button class="lightbox-prev" (click)="prevImage($event)">‹</button>
    <img class="lightbox-img" [src]="allImages()[lightboxIndex()!].image_path" [alt]="allImages()[lightboxIndex()!].alt_text" (click)="$event.stopPropagation()" />
    <button class="lightbox-next" (click)="nextImage($event)">›</button>
  </div>
}
